<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#B5652A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Bebestibles">
<title>Control de Bebestibles</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#B5652A;--accent-dark:#8E4A1E;--accent-light:#F5EDD8;
  --bg:#F7F4EF;--surface:#FFFFFF;--surface2:#F2EDE6;--surface3:#EAE0D5;
  --text:#1C0F07;--text2:#6B5040;--text3:#9A7D6B;
  --border:rgba(107,58,34,0.15);--border2:rgba(107,58,34,0.28);
  --radius:12px;--radius-sm:8px;
  --danger:#C0392B;--danger-bg:#FDF0EE;
  --success:#1A7F4B;--success-bg:#EAF7F0;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#150A04;--surface:#1F1009;--surface2:#2A160A;--surface3:#351C0E;
  --text:#F5EDD8;--text2:#C9A882;--text3:#8A6B52;
  --border:rgba(245,237,216,0.12);--border2:rgba(245,237,216,0.22);
  --danger-bg:#2A0E0B;--success-bg:#0D2A1A;
}}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.header{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:20;}
.logo{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo i{color:#FDF8F0;font-size:19px;}
.header-text .title{font-size:15px;font-weight:600;color:var(--text);}
.header-text .sub{font-size:11px;color:var(--text3);margin-top:1px;}
.bottom-nav{display:flex;background:var(--surface);border-top:0.5px solid var(--border);position:sticky;bottom:0;z-index:20;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:10px;font-family:inherit;-webkit-tap-highlight-color:transparent;}
.nav-item i{font-size:22px;}
.nav-item.active{color:var(--accent);}
.content{flex:1;padding:16px;overflow-y:auto;}
.page{display:none;}.page.active{display:block;}
.section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.section-label-auditorio{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;margin-top:16px;}
.nav-back{display:flex;align-items:center;gap:6px;color:var(--text3);font-size:14px;cursor:pointer;margin-bottom:14px;background:none;border:none;padding:0;-webkit-tap-highlight-color:transparent;}
.nav-back i{font-size:16px;}

/* GRIDS */
.room-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
.auditorio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.room-btn{padding:10px 4px 8px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:var(--text);text-align:center;line-height:1.4;-webkit-tap-highlight-color:transparent;transition:transform .1s;}
.room-btn:active{transform:scale(.94);}
.room-btn.has-records{border-color:var(--accent);color:var(--accent);}
.room-btn.auditorio{border-color:var(--border2);background:var(--surface2);}
.room-btn.auditorio.has-records{border-color:var(--accent);color:var(--accent);background:var(--surface);}
.room-btn.extras{border-color:#1A7F4B;color:#1A7F4B;background:var(--success-bg);font-size:13px;}
.room-btn.extras.has-records{border-color:#1A7F4B;color:#1A7F4B;background:var(--success-bg);}
.room-btn .badge{display:inline-block;background:var(--accent);color:#FDF8F0;border-radius:99px;font-size:10px;padding:1px 6px;margin-top:3px;}

/* PRODUCTOS */
.product-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.product-row{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);}
.product-emoji{font-size:17px;width:22px;text-align:center;flex-shrink:0;}
.product-name{flex:1;font-size:13px;color:var(--text);}
.qty-controls{display:flex;align-items:center;gap:9px;}
.qty-btn{width:30px;height:30px;border-radius:50%;border:0.5px solid var(--border2);background:var(--surface2);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.qty-btn:active{transform:scale(.86);}
.qty-num{width:26px;text-align:center;font-size:15px;font-weight:600;color:var(--text);}

/* BOTONES */
.btn-primary{width:100%;padding:13px;background:var(--accent);color:#FDF8F0;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:9px;-webkit-tap-highlight-color:transparent;}
.btn-primary:active{background:var(--accent-dark);transform:scale(.98);}
.btn-secondary{width:100%;padding:12px;background:transparent;color:var(--text2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;cursor:pointer;margin-bottom:9px;}
.btn-danger{width:100%;padding:12px;background:var(--danger-bg);color:var(--danger);border:0.5px solid var(--danger);border-radius:var(--radius-sm);font-size:14px;cursor:pointer;margin-bottom:9px;}

/* RESUMEN */
.summary-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.summary-header{padding:10px 13px;background:var(--surface2);border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
.summary-room{font-size:13px;font-weight:600;color:var(--text);}
.summary-time{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px;}
.summary-actions{display:flex;gap:6px;}
.icon-btn{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);-webkit-tap-highlight-color:transparent;}
.icon-btn.danger{border-color:var(--danger);color:var(--danger);}
.icon-btn:active{transform:scale(.88);}
.summary-row{padding:7px 13px;display:flex;justify-content:space-between;font-size:13px;border-bottom:0.5px solid var(--border);}
.summary-row:last-child{border-bottom:none;}
.summary-row span:last-child{font-weight:600;color:var(--accent);}
.stats-bar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat{background:var(--surface2);border-radius:var(--radius-sm);padding:11px 13px;}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:3px;}
.stat-val{font-size:21px;font-weight:700;color:var(--text);}
.empty-state{text-align:center;padding:36px 16px;color:var(--text3);font-size:13px;}
.empty-state i{font-size:34px;display:block;margin-bottom:9px;}
.readonly-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;background:var(--surface2);color:var(--text3);border:0.5px solid var(--border);border-radius:99px;padding:4px 10px;margin-bottom:12px;}
.prev-info{font-size:12px;color:var(--text3);margin-bottom:13px;padding:8px 12px;background:var(--surface2);border-radius:var(--radius-sm);}

/* CALENDARIO */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav button{width:34px;height:34px;border-radius:50%;border:0.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:18px;}
.cal-title{font-size:15px;font-weight:600;color:var(--text);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px;}
.cal-day-label{text-align:center;font-size:10px;font-weight:600;color:var(--text3);padding:4px 0;text-transform:uppercase;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:500;color:var(--text);background:var(--surface);border:0.5px solid var(--border);-webkit-tap-highlight-color:transparent;position:relative;}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-day.has-data{border-color:var(--accent);color:var(--accent);}
.cal-day.today{background:var(--accent);color:#FDF8F0;border-color:var(--accent);}
.cal-day.selected{background:var(--accent-dark);color:#FDF8F0;border-color:var(--accent-dark);}
.cal-day .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);position:absolute;bottom:3px;}
.cal-day.today .dot,.cal-day.selected .dot{background:#FDF8F0;}
.cal-selected-day{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:14px;}
.cal-selected-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;}

/* EXPORTAR */
.export-section{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.export-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;}
.export-tabs{display:flex;border:0.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:14px;}
.export-tab{flex:1;padding:9px 4px;background:var(--surface);border:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--text3);font-family:inherit;text-align:center;}
.export-tab.active{background:var(--accent);color:#FDF8F0;}
.export-range{display:none;}.export-range.active{display:block;}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.week-nav button{width:30px;height:30px;border-radius:50%;border:0.5px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:16px;}
.week-label{flex:1;text-align:center;font-size:12px;color:var(--text2);font-weight:500;}
.month-sel{width:100%;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;margin-bottom:10px;}
.export-preview{font-size:12px;color:var(--text3);margin-bottom:12px;padding:8px 10px;background:var(--surface2);border-radius:var(--radius-sm);}

/* MODAL SELECCIÓN DE SALA */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;align-items:flex-end;justify-content:center;}
.modal-box{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:20px 16px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.modal-header-title{font-size:14px;font-weight:600;color:var(--text);}
.modal-close{width:30px;height:30px;border-radius:50%;border:0.5px solid var(--border2);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);}
.modal-room-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo"><i class="ti ti-coffee"></i></div>
    <div class="header-text">
      <div class="title">Control de bebestibles</div>
      <div class="sub" id="header-date"></div>
    </div>
  </div>

  <div class="content">

    <!-- PÁGINA: HOY -->
    <div class="page active" id="page-hoy">
      <div class="section-label">Salas</div>
      <div class="room-grid" id="room-grid-hoy"></div>
      <div class="section-label-auditorio">Auditorios</div>
      <div class="auditorio-grid" id="auditorio-grid-hoy"></div>
      <div class="section-label-auditorio">Consumo personal</div>
      <div id="extras-grid-hoy" style="margin-bottom:16px;"></div>
      <button class="btn-primary" onclick="verResumenHoy()"><i class="ti ti-table-export"></i> Ver resumen de hoy</button>
    </div>

    <!-- PÁGINA: RESUMEN HOY -->
    <div class="page" id="page-resumen-hoy">
      <button class="nav-back" onclick="showPage('hoy')"><i class="ti ti-arrow-left"></i> Salas</button>
      <div class="section-label">Resumen de hoy</div>
      <div class="stats-bar" id="stats-hoy"></div>
      <div id="list-hoy"></div>
      <button class="btn-primary" onclick="irExportar()"><i class="ti ti-download"></i> Exportar Excel</button>
    </div>

    <!-- PÁGINA: EDITAR REGISTRO -->
    <div class="page" id="page-editar">
      <button class="nav-back" id="edit-back-btn"><i class="ti ti-arrow-left"></i> <span id="edit-back-label">Atrás</span></button>
      <div class="section-label" id="edit-label">Editando</div>
      <div class="prev-info" id="edit-info"></div>
      <div class="product-list" id="edit-product-list"></div>
      <button class="btn-primary" onclick="guardarEdicion()"><i class="ti ti-device-floppy"></i> Guardar cambios</button>
      <button class="btn-secondary" id="edit-cancel-btn">Cancelar</button>
    </div>

    <!-- PÁGINA: NUEVO REGISTRO -->
    <div class="page" id="page-nuevo">
      <button class="nav-back" id="nuevo-back-btn"><i class="ti ti-arrow-left"></i> Volver</button>
      <div class="section-label" id="nuevo-label">Nuevo registro</div>
      <div class="prev-info" id="nuevo-info"></div>
      <div class="product-list" id="nuevo-product-list"></div>
      <button class="btn-primary" onclick="guardarNuevo()"><i class="ti ti-device-floppy"></i> Guardar registro</button>
      <button class="btn-secondary" id="nuevo-cancel-btn">Cancelar</button>
    </div>

    <!-- PÁGINA: CALENDARIO -->
    <div class="page" id="page-calendario">
      <div class="section-label">Historial de registros</div>
      <div class="cal-nav">
        <button onclick="calPrev()"><i class="ti ti-chevron-left"></i></button>
        <span class="cal-title" id="cal-title"></span>
        <button onclick="calNext()"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div id="cal-day-detail" style="display:none;">
        <div class="cal-selected-day">
          <div class="cal-selected-title" id="cal-detail-title"></div>
          <div id="cal-detail-list"></div>
        </div>
      </div>
      <div id="cal-empty" class="empty-state"><i class="ti ti-touch"></i>Toca un día para ver sus registros.</div>
    </div>

    <!-- PÁGINA: EXPORTAR -->
    <div class="page" id="page-exportar">
      <div class="section-label">Exportar a Excel</div>
      <div class="export-section">
        <div class="export-title"><i class="ti ti-calendar"></i> Selecciona el período</div>
        <div class="export-tabs">
          <button class="export-tab active" onclick="setExportTab('dia')">Día</button>
          <button class="export-tab" onclick="setExportTab('semana')">Semana</button>
          <button class="export-tab" onclick="setExportTab('mes')">Mes</button>
        </div>
        <div class="export-range active" id="exp-dia">
          <input type="date" id="exp-dia-input" style="width:100%;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;margin-bottom:10px;" onchange="updateExportPreview()">
        </div>
        <div class="export-range" id="exp-semana">
          <div class="week-nav">
            <button onclick="semanaNav(-1)"><i class="ti ti-chevron-left"></i></button>
            <div class="week-label" id="week-label">Cargando...</div>
            <button onclick="semanaNav(1)"><i class="ti ti-chevron-right"></i></button>
          </div>
        </div>
        <div class="export-range" id="exp-mes">
          <select class="month-sel" id="exp-mes-select" onchange="updateExportPreview()"></select>
        </div>
        <div class="export-preview" id="export-preview">Selecciona un período.</div>
        <button class="btn-primary" onclick="doExport()"><i class="ti ti-download"></i> Descargar Excel</button>
      </div>
    </div>

  </div>


  <!-- MODAL: Seleccionar sala para día pasado -->
  <div class="modal-overlay" id="modal-seleccion" onclick="if(event.target===this)cerrarModal()">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-header-title" id="modal-title">Selecciona un espacio</span>
        <button class="modal-close" onclick="cerrarModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="section-label" style="margin-bottom:8px;">Salas y Auditorios</div>
      <div class="modal-room-grid" id="modal-room-grid"></div>
    </div>
  </div>
  <div class="bottom-nav">
    <button class="nav-item active" id="nav-hoy" onclick="showPage('hoy')"><i class="ti ti-layout-grid"></i>Hoy</button>
    <button class="nav-item" id="nav-calendario" onclick="showPage('calendario')"><i class="ti ti-calendar"></i>Historial</button>
    <button class="nav-item" id="nav-exportar" onclick="showPage('exportar')"><i class="ti ti-download"></i>Exportar</button>
  </div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN — edita aquí para agregar/quitar productos
// ============================================================
const PRODUCTS = [
  {id:'agua_gas',     name:'Agua con gas',        emoji:'💧'},
  {id:'agua_sin',     name:'Agua sin gas',         emoji:'💧'},
  {id:'coca_orig',    name:'Coca-Cola Original',   emoji:'🥤'},
  {id:'coca_zero',    name:'Coca-Cola Zero',       emoji:'🥤'},
  {id:'coca_light',   name:'Coca-Cola Light',      emoji:'🥤'},
  {id:'cafe',         name:'Café',                 emoji:'☕'},
  {id:'te',           name:'Té',                   emoji:'🍵'},
  {id:'jugo_manzana', name:'Jugo de manzana',      emoji:'🍎'},
  {id:'jugo_pina',    name:'Jugo de piña',         emoji:'🍍'},
  {id:'jugo_frutilla',name:'Jugo de frutilla',     emoji:'🍓'},
];

// Salas normales (1–15) + auditorios
const ROOMS = [
  {id:'sala_1',  label:'Sala 1',       tipo:'sala'},
  {id:'sala_2',  label:'Sala 2',       tipo:'sala'},
  {id:'sala_3',  label:'Sala 3',       tipo:'sala'},
  {id:'sala_4',  label:'Sala 4',       tipo:'sala'},
  {id:'sala_5',  label:'Sala 5',       tipo:'sala'},
  {id:'sala_6',  label:'Sala 6',       tipo:'sala'},
  {id:'sala_7',  label:'Sala 7',       tipo:'sala'},
  {id:'sala_8',  label:'Sala 8',       tipo:'sala'},
  {id:'sala_9',  label:'Sala 9',       tipo:'sala'},
  {id:'sala_10', label:'Sala 10',      tipo:'sala'},
  {id:'sala_11', label:'Sala 11',      tipo:'sala'},
  {id:'sala_12', label:'Sala 12',      tipo:'sala'},
  {id:'sala_13', label:'Sala 13',      tipo:'sala'},
  {id:'sala_14', label:'Sala 14',      tipo:'sala'},
  {id:'sala_15', label:'Sala 15',      tipo:'sala'},
  {id:'aud_1',   label:'Auditorio 1',  tipo:'auditorio'},
  {id:'aud_2',   label:'Auditorio 2',  tipo:'auditorio'},
  {id:'aud_3',   label:'Auditorio 3',  tipo:'auditorio'},
  {id:'extras',  label:'Extras',       tipo:'extras'},
];
// ============================================================

const PREFIX = 'cafe_v3_';

// Fecha local del dispositivo — evita desfase UTC
function todayISO(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
// Timestamp local para guardar la hora exacta al registrar
function nowLocalISO(){
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
}
function keyFor(iso)   { return PREFIX + iso; }
function isoFromKey(k) { return k.replace(PREFIX,''); }
function loadDay(iso)  { try{const s=localStorage.getItem(keyFor(iso));return s?JSON.parse(s):{};}catch(e){return{};} }
function saveDay(iso,d){ try{localStorage.setItem(keyFor(iso),JSON.stringify(d));}catch(e){} }
function removeDay(iso){ localStorage.removeItem(keyFor(iso)); }
function allISOs(){
  const r=[];
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(PREFIX))r.push(isoFromKey(k));}
  return r.filter(Boolean).sort().reverse();
}
function fmtISO(iso){
  // Parseo manual para evitar desfase de zona horaria
  const p=iso.split('-').map(Number);
  return new Date(p[0],p[1]-1,p[2]).toLocaleDateString('es-CL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function fmtTime(ts){
  // Si no tiene Z ni +, es timestamp local — parsearlo sin conversión UTC
  const d=(ts.includes('Z')||ts.includes('+'))?new Date(ts):new Date(ts.replace('T',' '));
  return d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
}
function countRegs(data){ return Object.values(data).reduce((s,r)=>s+(Array.isArray(r)?r.length:0),0); }
function totalUnits(data){
  let t=0;
  Object.values(data).forEach(recs=>{
    if(!Array.isArray(recs))return;
    recs.forEach(r=>{ PRODUCTS.forEach(p=>{ t+=(r.productos&&r.productos[p.id])||0; }); });
  });
  return t;
}
function getRoomById(id){ return ROOMS.find(r=>r.id===id)||{id,label:id,tipo:'sala'}; }

function renderResumenDia(iso, data, statsId, listId, editable, fromPage){
  const regs=countRegs(data), units=totalUnits(data);

  if(statsId && document.getElementById(statsId)){
    document.getElementById(statsId).innerHTML=`
      <div class="stat"><div class="stat-label">Registros</div><div class="stat-val">${regs}</div></div>
      <div class="stat"><div class="stat-label">Unidades totales</div><div class="stat-val">${units}</div></div>`;
  }

  const listEl=document.getElementById(listId);
  if(!listEl)return;

  // Recolectar todos los registros
  const allRecs=[];
  Object.keys(data).forEach(roomId=>{
    (data[roomId]||[]).forEach((r,idx)=>{
      allRecs.push({roomId, idx, ts:r.ts, productos:r.productos||{}});
    });
  });

  if(allRecs.length===0){
    listEl.innerHTML='<div class="empty-state"><i class="ti ti-mood-empty"></i>Sin registros.</div>';
    return;
  }

  // Ordenar: por tipo (salas primero) luego número/nombre, luego hora
  allRecs.sort((a,b)=>{
    const ra=getRoomById(a.roomId), rb=getRoomById(b.roomId);
    const orden={sala:0,auditorio:1,extras:2};
    const oa=orden[ra.tipo]??3, ob=orden[rb.tipo]??3;
    if(oa!==ob) return oa-ob;
    return ra.label.localeCompare(rb.label,'es',{numeric:true})||a.ts.localeCompare(b.ts);
  });

  let html='';
  allRecs.forEach(r=>{
    const room=getRoomById(r.roomId);
    const items=PRODUCTS.filter(p=>(r.productos[p.id]||0)>0);
    const editBtns=editable?`
      <div class="summary-actions">
        <button class="icon-btn" title="Editar" onclick="abrirEditar('${iso}','${r.roomId}',${r.idx},'${fromPage}')"><i class="ti ti-pencil"></i></button>
        <button class="icon-btn danger" title="Eliminar" onclick="eliminarRegistro('${iso}','${r.roomId}',${r.idx},'${fromPage}')"><i class="ti ti-trash"></i></button>
      </div>`:'';
    html+=`<div class="summary-card">
      <div class="summary-header">
        <span class="summary-room">${room.label}</span>
        <span class="summary-time"><i class="ti ti-clock"></i> ${fmtTime(r.ts)}</span>
        ${editBtns}
      </div>`;
    if(items.length===0){
      html+=`<div class="summary-row"><span style="color:var(--text3)">Sin productos registrados</span></div>`;
    } else {
      items.forEach(p=>{
        html+=`<div class="summary-row"><span>${p.emoji} ${p.name}</span><span>${r.productos[p.id]}</span></div>`;
      });
    }
    html+='</div>';
  });
  listEl.innerHTML=html;
}

function abrirEditar(iso, roomId, idx, fromPage){
  const data=loadDay(iso);
  const reg=(data[roomId]||[])[idx];
  if(!reg){alert('Registro no encontrado.');return;}
  editCtx={iso,roomId,idx,fromPage};
  const room=getRoomById(roomId);
  document.getElementById('edit-label').textContent=`Editando ${room.label} — ${fmtTime(reg.ts)}`;
  document.getElementById('edit-info').textContent=`Registro del ${fmtISO(iso)}. Modifica las cantidades y guarda.`;
  document.getElementById('edit-back-btn').onclick=()=>volverDe(fromPage);
  document.getElementById('edit-cancel-btn').onclick=()=>volverDe(fromPage);
  renderProductList('edit-product-list', reg.productos||{}, 'eq-');
  showPage('editar');
}

function guardarEdicion(){
  const qty={};
  PRODUCTS.forEach(p=>{
    const el=document.getElementById('eq-'+p.id);
    qty[p.id]=el?parseInt(el.textContent)||0:0;
  });
  if(!Object.values(qty).some(v=>v>0)){alert('Debe quedar al menos un producto.');return;}
  const {iso,roomId,idx,fromPage}=editCtx;
  const data=loadDay(iso);
  data[roomId][idx].productos={...qty};
  saveDay(iso,data);
  volverDe(fromPage);
}

function eliminarRegistro(iso, roomId, idx, fromPage){
  if(!confirm('¿Eliminar este registro?'))return;
  const data=loadDay(iso);
  if(data[roomId]) data[roomId].splice(idx,1);
  if(!data[roomId]||data[roomId].length===0) delete data[roomId];
  if(Object.keys(data).length===0) removeDay(iso);
  else saveDay(iso,data);
  volverDe(fromPage);
}

function volverDe(fromPage){
  if(fromPage==='resumen-hoy') renderResumenHoy();
  if(fromPage==='calendario')  renderCalendarioDia(calSelectedISO);
  showPage(fromPage);
}

function renderProductList(containerId, existingQty, prefix){
  const l=document.getElementById(containerId);
  if(!l)return;
  l.innerHTML='';
  PRODUCTS.forEach(p=>{
    const val=(existingQty&&existingQty[p.id])||0;
    const row=document.createElement('div');
    row.className='product-row';
    row.innerHTML=`<span class="product-emoji">${p.emoji}</span>
      <span class="product-name">${p.name}</span>
      <div class="qty-controls">
        <button class="qty-btn" onclick="qtyChg('${prefix}${p.id}',-1)"><i class="ti ti-minus"></i></button>
        <span class="qty-num" id="${prefix}${p.id}">${val}</span>
        <button class="qty-btn" onclick="qtyChg('${prefix}${p.id}',1)"><i class="ti ti-plus"></i></button>
      </div>`;
    l.appendChild(row);
  });
}

function qtyChg(elId, delta){
  const el=document.getElementById(elId);
  if(!el)return;
  el.textContent=Math.max(0,(parseInt(el.textContent)||0)+delta);
}

function initCal(){
  const now=new Date();
  calYear=now.getFullYear();
  calMonth=now.getMonth();
}
initCal();

function renderCalendario(){
  const allISO=new Set(allISOs());
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayStr=todayISO();
  const mName=new Date(calYear,calMonth,1).toLocaleDateString('es-CL',{month:'long',year:'numeric'});
  document.getElementById('cal-title').textContent=mName.charAt(0).toUpperCase()+mName.slice(1);

  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'].forEach(d=>{
    const el=document.createElement('div');
    el.className='cal-day-label';el.textContent=d;grid.appendChild(el);
  });
  for(let i=0;i<firstDay;i++){
    const el=document.createElement('div');el.className='cal-day empty';grid.appendChild(el);
  }
  for(let d=1;d<=daysInMonth;d++){
    const iso=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasData=allISO.has(iso);
    const isToday=iso===todayStr;
    const isSel=iso===calSelectedISO;
    const el=document.createElement('div');
    let cls='cal-day';
    if(isSel) cls+=' selected';
    else if(isToday) cls+=' today';
    else if(hasData) cls+=' has-data';
    el.className=cls;
    el.innerHTML=d+(hasData||isToday?'<span class="dot"></span>':'');
    el.onclick=()=>{ calSelectedISO=iso; renderCalendario(); renderCalendarioDia(iso); };
    grid.appendChild(el);
  }
}

function renderCalendarioDia(iso){
  const detail=document.getElementById('cal-day-detail');
  const empty=document.getElementById('cal-empty');
  const data=loadDay(iso);
  const regs=countRegs(data);
  const units=totalUnits(data);

  document.getElementById('cal-detail-title').textContent=fmtISO(iso);
  const detailList=document.getElementById('cal-detail-list');

  detailList.innerHTML=`
    <div class="stats-bar" style="margin-bottom:10px;">
      <div class="stat"><div class="stat-label">Registros</div><div class="stat-val">${regs}</div></div>
      <div class="stat"><div class="stat-label">Unidades</div><div class="stat-val">${units}</div></div>
    </div>
    <div id="cal-records-list"></div>`;

  const btnAgregar=document.createElement('button');
  btnAgregar.className='btn-success';
  btnAgregar.style.cssText='width:100%;padding:12px;margin-top:8px;';
  btnAgregar.innerHTML='<i class="ti ti-plus"></i> Agregar registro a este día';
  btnAgregar.onclick=()=>abrirNuevoEnDia(iso);
  detailList.appendChild(btnAgregar);

  if(regs>0){
    const btnExport=document.createElement('button');
    btnExport.className='btn-primary';
    btnExport.style.cssText='width:100%;padding:12px;margin-top:4px;';
    btnExport.innerHTML='<i class="ti ti-download"></i> Exportar este día';
    btnExport.onclick=()=>expDiaDirecto(iso);
    detailList.appendChild(btnExport);

    const btnDel=document.createElement('button');
    btnDel.className='btn-danger';
    btnDel.style.cssText='width:100%;padding:12px;margin-top:4px;';
    btnDel.innerHTML='<i class="ti ti-trash"></i> Eliminar día completo';
    btnDel.onclick=()=>eliminarDia(iso);
    detailList.appendChild(btnDel);

    renderResumenDia(iso, data, null, 'cal-records-list', true, 'calendario');
  } else {
    document.getElementById('cal-records-list').innerHTML=
      '<div style="font-size:13px;color:var(--text3);text-align:center;padding:10px 0;">Sin registros aún. Agrega uno con el botón de arriba.</div>';
  }

  detail.style.display='block';
  empty.style.display='none';
}
function eliminarDia(iso){
  if(!confirm(`¿Eliminar TODOS los registros del ${fmtISO(iso)}? No se puede deshacer.`))return;
  removeDay(iso);
  calSelectedISO=null;
  renderCalendario();
  document.getElementById('cal-day-detail').style.display='none';
  document.getElementById('cal-empty').style.display='block';
}

function setExportTab(t){
  exportTab=t;
  ['dia','semana','mes'].forEach((x,i)=>{
    document.querySelectorAll('.export-tab')[i].classList.toggle('active',x===t);
    document.getElementById('exp-'+x).classList.toggle('active',x===t);
  });
  updateExportPreview();
}

function semanaNav(dir){ semanaOffset+=dir; renderSemanaLabel(); updateExportPreview(); }

function getWeekRange(offset){
  const now=new Date();
  const dow=now.getDay();
  const mon=new Date(now); mon.setDate(now.getDate()-dow+1+offset*7);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  return {start:mon.toISOString().slice(0,10), end:sun.toISOString().slice(0,10)};
}

function renderSemanaLabel(){
  const {start,end}=getWeekRange(semanaOffset);
  const s=new Date(start+'T12:00:00'), e=new Date(end+'T12:00:00');
  const fmt=d=>d.toLocaleDateString('es-CL',{day:'numeric',month:'short'});
  const name=semanaOffset===0?'Esta semana':semanaOffset===-1?'Semana pasada':`Semana del ${fmt(s)}`;
  document.getElementById('week-label').textContent=`${name} (${fmt(s)} – ${fmt(e)})`;
}

function populateMonthSelect(){
  const sel=document.getElementById('exp-mes-select');
  sel.innerHTML='';
  const months=[...new Set(allISOs().map(i=>i.slice(0,7)))].sort().reverse();
  if(months.length===0){sel.innerHTML='<option>Sin datos</option>';return;}
  months.forEach(m=>{
    const opt=document.createElement('option');
    opt.value=m;
    const d=new Date(m+'-01T12:00:00');
    opt.textContent=d.toLocaleDateString('es-CL',{month:'long',year:'numeric'});
    sel.appendChild(opt);
  });
}

function getDaysForExport(){
  const all=allISOs();
  if(exportTab==='dia'){
    const d=document.getElementById('exp-dia-input').value;
    return d&&all.includes(d)?[d]:[];
  }
  if(exportTab==='semana'){
    const {start,end}=getWeekRange(semanaOffset);
    return all.filter(i=>i>=start&&i<=end);
  }
  if(exportTab==='mes'){
    const m=document.getElementById('exp-mes-select').value;
    return m?all.filter(i=>i.startsWith(m)):[];
  }
  return [];
}

function updateExportPreview(){
  if(exportTab==='semana') renderSemanaLabel();
  const days=getDaysForExport();
  const p=document.getElementById('export-preview');
  if(days.length===0){p.textContent='No hay registros para el período seleccionado.';return;}
  let r=0,u=0;
  days.forEach(iso=>{const d=loadDay(iso);r+=countRegs(d);u+=totalUnits(d);});
  p.textContent=`${days.length} día${days.length>1?'s':''} · ${r} registro${r>1?'s':''} · ${u} unidades totales`;
}

function doExport(){
  const days=getDaysForExport();
  if(days.length===0){alert('No hay registros para el período seleccionado.');return;}
  let label='';
  if(exportTab==='dia') label='Día_'+days[0];
  else if(exportTab==='semana'){ const {start,end}=getWeekRange(semanaOffset); label='Semana_'+start+'_al_'+end; }
  else { const m=document.getElementById('exp-mes-select').value; label='Mes_'+m; }
  doExportForDays(days, label);
}

function doExportForDays(days, label){
  const C_CAFE='B5652A', C_MID='D4956A', C_LIGHT='F5EDD8';
  const C_WHITE='FFFFFF', C_DARK='1C0F07', C_DARK_FG='F5EDD8', C_ZERO='BBBBBB';

  const bThin={top:{style:'thin',color:{rgb:C_MID}},bottom:{style:'thin',color:{rgb:C_MID}},left:{style:'thin',color:{rgb:C_MID}},right:{style:'thin',color:{rgb:C_MID}}};
  const bMed={top:{style:'medium',color:{rgb:C_CAFE}},bottom:{style:'medium',color:{rgb:C_CAFE}},left:{style:'medium',color:{rgb:C_CAFE}},right:{style:'medium',color:{rgb:C_CAFE}}};

  const sTitle=(sz=14)=>({font:{bold:true,sz,name:'Arial',color:{rgb:C_WHITE}},fill:{fgColor:{rgb:C_CAFE}},alignment:{horizontal:'center',vertical:'center'}});
  const sSub=()=>({font:{sz:11,name:'Arial',color:{rgb:C_WHITE}},fill:{fgColor:{rgb:C_MID}},alignment:{horizontal:'center',vertical:'center'}});
  const sHdr=()=>({font:{bold:true,sz:11,name:'Arial',color:{rgb:C_WHITE}},fill:{fgColor:{rgb:C_CAFE}},alignment:{horizontal:'center',vertical:'center',wrapText:true},border:bMed});
  const sData=(even,zero=false,bold=false,left=false)=>({font:{sz:11,name:'Arial',color:{rgb:zero?C_ZERO:C_DARK},bold},fill:{fgColor:{rgb:even?C_WHITE:C_LIGHT}},alignment:{horizontal:left?'left':'center',vertical:'center'},border:bThin});
  const sTot=(left=false)=>({font:{bold:true,sz:12,name:'Arial',color:{rgb:C_DARK_FG}},fill:{fgColor:{rgb:C_DARK}},alignment:{horizontal:left?'left':'center',vertical:'center'},border:bMed});

  function applyS(ws,r,c,s){const ref=XLSX.utils.encode_cell({r,c});if(!ws[ref])ws[ref]={v:'',t:'s'};ws[ref].s=s;}
  function merge(ws,rs,re,cs,ce){if(!ws['!merges'])ws['!merges']=[];ws['!merges'].push({s:{r:rs,c:cs},e:{r:re,c:ce}});}

  const wb=XLSX.utils.book_new();
  const generated=new Date().toLocaleString('es-CL');

  // Recoger registros
  let allRecs=[];
  days.sort().forEach(iso=>{
    const data=loadDay(iso);
    Object.keys(data).forEach(roomId=>{
      (data[roomId]||[]).forEach(r=>{
        allRecs.push({iso,roomId,ts:r.ts,productos:r.productos||{}});
      });
    });
  });
  allRecs.sort((a,b)=>{
    if(a.iso!==b.iso) return a.iso.localeCompare(b.iso);
    const ra=getRoomById(a.roomId), rb=getRoomById(b.roomId);
    const orden={sala:0,auditorio:1,extras:2};
    const oa=orden[ra.tipo]??3, ob=orden[rb.tipo]??3;
    if(oa!==ob) return oa-ob;
    return ra.label.localeCompare(rb.label,'es',{numeric:true})||a.ts.localeCompare(b.ts);
  });

  const NCOLS=3+PRODUCTS.length+1; // fecha,espacio,hora,productos...,total

  // ── HOJA 1: DETALLE ──────────────────────────────────────
  {
    const rows=[];
    rows.push([`Reporte de Bebestibles — ${label.replace(/_/g,' ')}`]);
    rows.push([`Generado el ${generated}`]);
    rows.push([]);
    rows.push(['Fecha','Espacio','Hora',...PRODUCTS.map(p=>p.name),'Total']);

    const totals=new Array(PRODUCTS.length).fill(0);
    let grand=0;
    const dataRows=[];
    allRecs.forEach(r=>{
      const room=getRoomById(r.roomId);
      const row=[new Date(r.iso+'T12:00:00').toLocaleDateString('es-CL'), room.label, fmtTime(r.ts)];
      let rt=0;
      PRODUCTS.forEach((p,i)=>{const v=r.productos[p.id]||0;row.push(v);totals[i]+=v;rt+=v;});
      row.push(rt); grand+=rt; dataRows.push(row);
    });
    dataRows.forEach(r=>rows.push(r));
    rows.push([]);
    rows.push(['TOTAL GENERAL','','', ...totals, grand]);

    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:14},{wch:14},{wch:8},...PRODUCTS.map(()=>({wch:18})),{wch:10}];
    merge(ws,0,0,0,NCOLS-1); merge(ws,1,1,0,NCOLS-1);
    for(let c=0;c<NCOLS;c++){ applyS(ws,0,c,sTitle()); applyS(ws,1,c,sSub()); applyS(ws,3,c,sHdr()); }
    dataRows.forEach((_,i)=>{
      const er=4+i, even=i%2===0;
      for(let c=0;c<NCOLS;c++){
        const ref=XLSX.utils.encode_cell({r:er,c});
        const isZero=c>=3&&c<NCOLS-1&&ws[ref]&&ws[ref].v===0;
        const isTot=c===NCOLS-1;
        applyS(ws,er,c,sData(even,isZero,isTot,c<3));
      }
    });
    const tr=4+dataRows.length+1;
    for(let c=0;c<NCOLS;c++) applyS(ws,tr,c,sTot(c<3));
    ws['!rows']=[]; ws['!rows'][0]={hpt:30}; ws['!rows'][1]={hpt:22}; ws['!rows'][3]={hpt:34};
    dataRows.forEach((_,i)=>{ ws['!rows'][4+i]={hpt:22}; });
    ws['!rows'][4+dataRows.length+1]={hpt:28};
    XLSX.utils.book_append_sheet(wb,ws,'Detalle completo');
  }

  // ── HOJA 2: POR PRODUCTO ─────────────────────────────────
  {
    const g={};PRODUCTS.forEach(p=>g[p.id]=0);
    allRecs.forEach(r=>PRODUCTS.forEach(p=>{g[p.id]+=(r.productos[p.id]||0);}));
    const grand=Object.values(g).reduce((s,v)=>s+v,0);
    const sorted=[...PRODUCTS].sort((a,b)=>(g[b.id]||0)-(g[a.id]||0));
    const rows=[];
    rows.push(['Resumen por Producto']); rows.push([label.replace(/_/g,' ')]); rows.push([]);
    rows.push(['Producto','Total unidades','% del total','Ranking']);
    const dRows=sorted.map((p,i)=>[p.name, g[p.id], grand>0?((g[p.id]/grand)*100).toFixed(1)+'%':'0%', '#'+(i+1)]);
    dRows.forEach(r=>rows.push(r));
    rows.push([]); rows.push(['TOTAL',grand,'100%','']);
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:24},{wch:16},{wch:14},{wch:10}];
    merge(ws,0,0,0,3); merge(ws,1,1,0,3);
    for(let c=0;c<4;c++){ applyS(ws,0,c,sTitle()); applyS(ws,1,c,sSub()); applyS(ws,3,c,sHdr()); }
    dRows.forEach((_,i)=>{const er=4+i,even=i%2===0;for(let c=0;c<4;c++){const ref=XLSX.utils.encode_cell({r:er,c});const isZ=c===1&&ws[ref]&&ws[ref].v===0;applyS(ws,er,c,sData(even,isZ,c===3,c===0));}});
    const tr=4+dRows.length+1; for(let c=0;c<4;c++) applyS(ws,tr,c,sTot(c===0));
    ws['!rows']=[]; ws['!rows'][0]={hpt:30}; ws['!rows'][1]={hpt:22}; ws['!rows'][3]={hpt:34};
    XLSX.utils.book_append_sheet(wb,ws,'Por producto');
  }

  // ── HOJA 3: POR ESPACIO ──────────────────────────────────
  {
    const sData2={};
    allRecs.forEach(r=>{
      if(!sData2[r.roomId])sData2[r.roomId]={regs:0,units:0};
      sData2[r.roomId].regs++;
      sData2[r.roomId].units+=PRODUCTS.reduce((s,p)=>s+(r.productos[p.id]||0),0);
    });
    const rows=[];
    rows.push(['Resumen por Espacio']); rows.push([label.replace(/_/g,' ')]); rows.push([]);
    rows.push(['Espacio','Tipo','N° registros','Total unidades']);
    const dRows=Object.keys(sData2).sort((a,b)=>{
      const ra=getRoomById(a),rb=getRoomById(b);
      const orden={sala:0,auditorio:1,extras:2};
      const oa=orden[ra.tipo]??3, ob=orden[rb.tipo]??3;
      if(oa!==ob) return oa-ob;
      return ra.label.localeCompare(rb.label,'es',{numeric:true});
    }).map(id=>{const room=getRoomById(id);const d=sData2[id];const tipo=room.tipo==='auditorio'?'Auditorio':room.tipo==='extras'?'Extras':'Sala';return[room.label,tipo,d.regs,d.units];});
    dRows.forEach(r=>rows.push(r));
    const totR=dRows.reduce((s,r)=>s+r[2],0), totU=dRows.reduce((s,r)=>s+r[3],0);
    rows.push([]); rows.push(['TOTAL','',totR,totU]);
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:16},{wch:12},{wch:14},{wch:16}];
    merge(ws,0,0,0,3); merge(ws,1,1,0,3);
    for(let c=0;c<4;c++){ applyS(ws,0,c,sTitle()); applyS(ws,1,c,sSub()); applyS(ws,3,c,sHdr()); }
    dRows.forEach((_,i)=>{const er=4+i,even=i%2===0;for(let c=0;c<4;c++) applyS(ws,er,c,sData(even,false,false,c<2));});
    const tr=4+dRows.length+1; for(let c=0;c<4;c++) applyS(ws,tr,c,sTot(c<2));
    ws['!rows']=[]; ws['!rows'][0]={hpt:30}; ws['!rows'][1]={hpt:22}; ws['!rows'][3]={hpt:34};
    XLSX.utils.book_append_sheet(wb,ws,'Por espacio');
  }

  // ── HOJA 4: POR DÍA (solo si más de 1 día) ───────────────
  if(days.length>1){
    const rows=[];
    rows.push(['Resumen por Día']); rows.push([label.replace(/_/g,' ')]); rows.push([]);
    rows.push(['Fecha','Registros','Unidades']);
    const dRows=days.sort().map(iso=>{
      const d=loadDay(iso);
      return[new Date(iso+'T12:00:00').toLocaleDateString('es-CL'), countRegs(d), totalUnits(d)];
    });
    dRows.forEach(r=>rows.push(r));
    const totR=dRows.reduce((s,r)=>s+r[1],0), totU=dRows.reduce((s,r)=>s+r[2],0);
    rows.push([]); rows.push(['TOTAL',totR,totU]);
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:18},{wch:12},{wch:14}];
    merge(ws,0,0,0,2); merge(ws,1,1,0,2);
    for(let c=0;c<3;c++){ applyS(ws,0,c,sTitle()); applyS(ws,1,c,sSub()); applyS(ws,3,c,sHdr()); }
    dRows.forEach((_,i)=>{const er=4+i,even=i%2===0;for(let c=0;c<3;c++) applyS(ws,er,c,sData(even,false,false,c===0));});
    const tr=4+dRows.length+1; for(let c=0;c<3;c++) applyS(ws,tr,c,sTot(c===0));
    ws['!rows']=[]; ws['!rows'][0]={hpt:30}; ws['!rows'][1]={hpt:22}; ws['!rows'][3]={hpt:34};
    XLSX.utils.book_append_sheet(wb,ws,'Por día');
  }

  XLSX.writeFile(wb,'Bebestibles_'+label+'.xlsx');
}
</script>
